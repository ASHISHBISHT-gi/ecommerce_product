<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .container{
            position: relative;
            border:1px solid red;
            background-color:red;
        }
        /* wrapper child of container */
        .container .wrapper{
            width:60vw;
            height:75vh;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.6);
            margin:5rem auto;
            border:1px solid green;
            background-color: green;
            /* overflow: hidden; */
        }
        /* holds images */
        .container .wrapper-holder{
            background-color: yellow;
            display: grid;
            grid-template-columns: repeat(4,100%);
            height:100%;
            width:100%;
            animation: slider 10s ease-in-out infinite alternate;
        }
        .container #slider-img-1{
            background-image: url(./images/image-product-1.jpg);
            background-position: center;
        }
        .container #slider-img-2{
            background-image: url(./images/image-product-2.jpg);
            background-position: center;
        }
        .container #slider-img-3{
            background-image: url(./images/image-product-4.jpg);
            background-position: center;
        }
        .container #slider-img-4{
            background-image: url(./images/image-product-1.jpg);
            background-position: center;
        }

        .container .button-holder .button{
            background-color: white;
            width:15px;
            height:15px;
            border-radius: 15px;
            display: inline-block;
            margin: .3rem;
        }
        .container .button-holder{
            position: absolute;
            left:45%;
            /* bottom:0%; */
        }
        @keyframes slider{
            0%{transform: translateX(0%);}
            10%{transform: translateX(-100%);}
            20%{transform: translateX(-100%);}
            30%{transform: translateX(-200%);}
            40%{transform: translateX(-200%);}
            50%{transform: translateX(-200%);}
            60%{transform: translateX(-300%);}
            70%{transform: translateX(-300%);}
            80%{transform: translateX(-300%);}
            /* 90%{transform: translateX(0%);} */
            /* 100%{transform: translateX(0%);} */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="wrapper">
            <!-- holds images -->
            <div class="wrapper-holder">
                <div id="slider-img-1"></div>
                <div id="slider-img-2"></div>
                <div id="slider-img-3"></div>
                <div id="slider-img-4"></div>
            </div>
        </div>
        <div class="button-holder">
            <a href="" class="button"></a>
            <a href="" class="button"></a>
            <a href="" class="button"></a>
            <a href="" class="button"></a>
        </div>
    </div>
</body>

</html>
