<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | E-commerce product page</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header>
      <div class="left">
        <img src="./images/icon-menu.svg" alt="select">
        <h2>sneakers</h2>
      <ul>
        <li>Collections</li>
        <li>Men</li>
        <li>Women</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
      </div>

      <ul class="right">
        <li><img src="./images/icon-cart.svg" alt="cart"></li>
        <li><img class="avatar" src="./images/image-avatar.png" alt="avatar"></li>
      </ul>
    </header>

    <!-- mid -->
    <div class="mid">

      <!-- left -->
      <div class="mid-left">
        <!-- <img id="image" src="./images/image-product-1.jpg" alt=""> -->
        <div class="image">
          <!-- container -->
          <div class="container">
            <div class="pic 1" style="background-image: url(./images/image-product-1.jpg);"></div>
            <div class="pic 2" style="background-image: url(./images/image-product-2.jpg);"></div>
            <div class="pic 3" style="background-image: url(./images/image-product-3.jpg);"></div>
            <div class="pic 4" style="background-image: url(./images/image-product-4.jpg);"></div>
            
          </div>
          <div class="buttons">
            <button class="prev"><img src="./images/icon-previous.svg" alt="move-left"></button>
            <button class="next"><img src="./images/icon-next.svg" alt="move-right"></button>
          </div>
        </div>
      </div>

      <!-- right -->
      <div class="mid-right">
        <div class="details">
          <p>SNEAKER COMPANY</p>
          <h1>Fall Limited Edition Sneakers</h1>
          <p>These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.</p>
        </div>
        
        <div class="price">
          <div><h2>$125.00</h2> <span class="discount">50%</span></div>
          <h3>$250.00</h3>
        </div>

        <div class="add-cart">
          <div class="quantity">
            <button><img src="./images/icon-minus.svg" alt="minus"></button>
            <span>0</span>
            <button><img src="./images/icon-plus.svg" alt="plus "></button>
          </div>
          <button class="submit"><img src="./images/icon-cart.svg" alt="">Add to cart</button>
      </div>
    </div>
    </div>
  </main>
  
  
  <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
  <script src="./script.js"></script>
</body>
</html>
